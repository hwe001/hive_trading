name: Run HIVE Tradier Bot

on:
  schedule:
    # 3:30 PM New York during daylight saving time (earlier than Alpaca to allow options fill time)
    - cron: "30 19 * * 1-5"
    # 3:30 PM New York during standard time
    - cron: "30 20 * * 1-5"
  workflow_dispatch:
    inputs:
      execute_orders:
        description: "Submit Tradier orders?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      bypass_time_gate:
        description: "Bypass 3:30 PM ET time gate?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      close_options:
        description: "Force-close existing HIVE options first?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      use_sandbox:
        description: "Use Tradier sandbox (paper)?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  trade:
    runs-on: ubuntu-latest

    env:
      TRADIER_API_TOKEN:      ${{ secrets.TRADIER_API_TOKEN }}
      TRADIER_ACCOUNT_ID:     ${{ secrets.TRADIER_ACCOUNT_ID }}
      TRADIER_EXECUTE_ORDERS: ${{ secrets.TRADIER_EXECUTE_ORDERS }}
      TRADIER_USE_SANDBOX:    ${{ secrets.TRADIER_USE_SANDBOX }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HIVE Tradier bot
        shell: bash
        run: |
          args=()

          execute="${{ github.event.inputs.execute_orders }}"
          if [[ "$execute" == "true" || "$TRADIER_EXECUTE_ORDERS" == "true" ]]; then
            args+=(--execute --cancel-open-orders)
          fi

          bypass="${{ github.event.inputs.bypass_time_gate }}"
          if [[ "$bypass" == "true" ]]; then
            args+=(--force-run)
          fi

          close="${{ github.event.inputs.close_options }}"
          if [[ "$close" == "true" ]]; then
            args+=(--close-options)
          fi

          # Allow per-run sandbox override
          sandbox="${{ github.event.inputs.use_sandbox }}"
          if [[ "$sandbox" == "false" ]]; then
            export TRADIER_USE_SANDBOX=false
          fi

          python hive_tradier_runner.py "${args[@]}"
