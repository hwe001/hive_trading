name: Run HIVE Paper Bot

on:
  schedule:
    # 3:45 PM New York during daylight saving time.
    - cron: "45 19 * * 1-5"
    # 3:45 PM New York during standard time.
    - cron: "45 20 * * 1-5"
  workflow_dispatch:
    inputs:
      submit_paper_orders:
        description: "Submit Alpaca paper orders?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      bypass_345pm_gate:
        description: "Bypass 3:45 PM New York time gate for manual test?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  rebalance:
    runs-on: ubuntu-latest

    env:
      HIVE_ALPACA_API_KEY_ID:     ${{ secrets.HIVE_ALPACA_API_KEY_ID }}
      HIVE_ALPACA_API_SECRET_KEY: ${{ secrets.HIVE_ALPACA_API_SECRET_KEY }}
      HIVE_EXECUTE_ORDERS:        ${{ secrets.HIVE_EXECUTE_ORDERS }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run HIVE paper bot
        shell: bash
        run: |
          args=()

          submit="${{ github.event.inputs.submit_paper_orders }}"
          if [[ "$submit" == "true" || "$HIVE_EXECUTE_ORDERS" == "true" ]]; then
            args+=(--execute --cancel-open-orders)
          fi

          bypass="${{ github.event.inputs.bypass_345pm_gate }}"
          if [[ "$bypass" == "true" ]]; then
            args+=(--force-run)
          fi

          python hive_paper_trade_runner.py "${args[@]}"
